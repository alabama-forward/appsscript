# Jekyll configuration for Apps Script Documentation

title: Apps Script Field Coordination Documentation
description: Documentation for Field Coordination Browser and FieldPlan Analyzer
baseurl: "/appsscript"
url: ""

# Theme
# theme: jekyll-theme-minimal
remote_theme: pages-themes/minimal@v0.2.0

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Default layouts
defaults:
  - scope:
      path: ""
    values:
      layout: "default"

# Exclude files
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
